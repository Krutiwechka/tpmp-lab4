name: CI Build and Test

on:
  push:
    branches: [ main, master, development ]
  pull_request:
    branches: [ main, master, development ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcunit1 libcunit1-dev sqlite3 libsqlite3-dev lcov

    - name: Compile project with coverage
      run: |
        mkdir -p build bin
        for src in src/*.c; do
          gcc -Wall -Iincludes -fprofile-arcs -ftest-coverage -c "$src" -o "build/$(basename ${src%.c}).o"
        done
        gcc -o bin/music_salon build/*.o -lsqlite3 -lcunit -fprofile-arcs -ftest-coverage

    - name: Compile tests with coverage (excluding main.o)
      run: |
        mkdir -p build_tests
        for test in tests/test_*.c; do
          name=$(basename "$test" .c)
          gcc -Wall -Iincludes -fprofile-arcs -ftest-coverage -c "$test" -o "build_tests/${name}.o"
          # Исключаем main.o при линковке тестов
          gcc -o "tests/${name}" "build_tests/${name}.o" build/auth.o build/db.o build/cd.o build/sale.o build/report.o build/utils.o -lsqlite3 -lcunit -fprofile-arcs -ftest-coverage
        done

    - name: Run unit tests
      run: |
        for t in tests/test_*; do
          if [ -f "$t" ] && [ ! "$t" = "tests/test_*.c" ] && [ ! "${t##*.}" = "c" ]; then
            echo "Running $t"
            ./$t
          fi
        done

    - name: Generate coverage report
      run: |
        gcov -pb src/*.c 2>/dev/null || true
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch,gcov,source 2>/dev/null || true
        lcov --remove coverage.info 'tests/*' '/usr/*' '*/includes/*' '*/build/*' --output-file coverage.info 2>/dev/null || true
        genhtml coverage.info --output-directory coverage 2>/dev/null || true
        echo "Coverage report generated"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.info
        flags: unittests
        name: music-salon-coverage
        fail_ci_if_error: false
